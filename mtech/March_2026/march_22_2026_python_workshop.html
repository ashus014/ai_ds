<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../favicon.png">
    <title>Python Workshop 1 | March 22, 2026 | IIT Patna M.Tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .wrapper { max-width: 1100px; margin: 0 auto; }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .navbar-brand {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #764ba2; }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 36px 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.1em; margin-bottom: 10px; font-weight: 700; }
        .header p { font-size: 1.05em; opacity: 0.95; margin-bottom: 6px; }
        .date-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95em;
            margin-top: 14px;
        }
        .content { padding: 28px 32px 36px; }
        .pdf-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 2px solid #e8eaf6;
        }
        .pdf-toolbar p { color: #666; font-size: 0.95em; max-width: 520px; line-height: 1.5; }
        .pdf-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            white-space: nowrap;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .pdf-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.45);
        }
        .pdf-viewer {
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            background: #2d2d2d;
            min-height: 70vh;
        }
        .pdf-viewer iframe {
            width: 100%;
            height: 85vh;
            min-height: 500px;
            border: none;
            display: block;
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .pdf-viewer iframe { height: 75vh; min-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <a href="../../index.html" class="navbar-brand">🎓 Ashu Singh</a>
            <a href="../mtech-lectures.html" class="back-link">← Back to Lectures</a>
            <a href="../../index.html" class="back-link">← Back to Home</a>
        </nav>
        <div class="container">
            <div class="header">
                <h1>Python Workshop 1</h1>
                <p>IIT Patna — AI &amp; Data Science (M.Tech)</p>
                <div class="date-badge">📅 March 22, 2026</div>
            </div>
            <div class="content">
                <div class="pdf-toolbar">
                    <p>Scroll inside the viewer below to read the full deck. If it does not load in your browser, use the button to open the PDF directly.</p>
                    <a class="pdf-link" href="Python_Workshop_1.pdf" target="_blank" rel="noopener">Open PDF in new tab</a>
                </div>
                <div class="pdf-viewer">
                    <iframe
                        src="Python_Workshop_1.pdf"
                        title="Python Workshop 1 — PDF"
                    ></iframe>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

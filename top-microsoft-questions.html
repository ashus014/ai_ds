<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Top Microsoft Questions | Learning Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrapper { width: 100%; max-width: 900px; }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .navbar-brand {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #764ba2; }
        .main-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
        }
        .page-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .page-title-row img { width: 36px; height: 36px; object-fit: contain; }
        .main-container h2 {
            color: #667eea;
            font-size: 2em;
            margin: 0;
            text-align: center;
        }
        .lede {
            text-align: center;
            color: #555;
            line-height: 1.65;
            max-width: 640px;
            margin: 0 auto 28px;
            font-size: 1.02em;
        }
        .courses-title {
            color: #764ba2;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .courses-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .course-item {
            padding: 12px 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left: 4px solid #667eea;
            border-radius: 6px;
            color: #666;
            font-size: 0.98em;
        }
        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">🎓 Ashu Singh</a>
            <a href="index.html" class="back-link">← Back to Home</a>
        </nav>
        <div class="main-container">
            <div class="page-title-row">
                <img src="assets/brand-microsoft.svg" width="36" height="36" alt="" decoding="async">
                <h2>Top Microsoft Questions</h2>
            </div>
            <p class="lede">Curated coding and design problems commonly seen in Microsoft interviews. Annotated solutions and links will be added here over time.</p>
            <div class="courses-title">Topics</div>
            <ul class="courses-list">
                <li class="course-item">More questions and write-ups coming soon.</li>
            </ul>
        </div>
    </div>
</body>
</html>

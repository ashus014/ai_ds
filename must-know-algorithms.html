<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Must Know Algorithms | Learning Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrapper { width: 100%; max-width: 900px; }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .navbar-brand {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #764ba2; }
        .main-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
        }
        .main-container h2 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 30px;
            text-align: center;
        }
        .courses-title {
            color: #764ba2;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .courses-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .course-item {
            padding: 12px 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left: 4px solid #667eea;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .course-item a {
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .course-item .date-tag {
            font-size: 0.85em;
            color: #999;
            margin-left: 10px;
        }
        .course-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-left-color: #764ba2;
            padding-left: 20px;
        }
        .course-item .arrow { color: #667eea; }
        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">🎓 Ashu Singh</a>
            <a href="index.html" class="back-link">← Back to Home</a>
        </nav>
        <div class="main-container">
            <h2>Must Know Algorithms</h2>
            <div class="courses-title">Topics</div>
            <ul class="courses-list">
                <li class="course-item">
                    <a href="must-know-algorithms/topological-sort.html">
                        <span>I. Topological sort <span class="date-tag">— Apr 3, 2026</span></span>
                        <span class="arrow">→</span>
                    </a>
                </li>
                <li class="course-item">
                    <a href="must-know-algorithms/kahns-algorithm.html">
                        <span>II. Kahn's algorithm <span class="date-tag">— Apr 3, 2026</span></span>
                        <span class="arrow">→</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Stanford ML | Learning Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrapper { width: 100%; max-width: 900px; }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .navbar-brand {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #764ba2; }
        .main-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
        }
        .page-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .page-title-row img { width: 36px; height: 36px; object-fit: contain; }
        .main-container h2 {
            color: #667eea;
            font-size: 2em;
            margin: 0;
            text-align: center;
        }
        .notes-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .note-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .note-card:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .note-info { flex: 1; }
        .note-title { font-weight: 600; color: #333; font-size: 1.05em; margin-bottom: 5px; }
        .note-date { color: #333; font-size: 0.9em; }
        .note-date .date-tag { font-size: 0.85em; color: #999; }
        .note-arrow { color: #667eea; font-size: 1.3em; margin-left: 15px; transition: transform 0.3s ease; }
        .note-card:hover .note-arrow { transform: translateX(5px); }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; }
            .note-card { flex-direction: column; text-align: left; gap: 10px; }
            .note-arrow { transform: rotate(90deg); margin-left: 0; }
            .note-card:hover .note-arrow { transform: rotate(90deg) translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">🎓 Ashu Singh</a>
            <a href="index.html" class="back-link">← Back to Home</a>
        </nav>
        <div class="main-container">
            <div class="page-title-row">
                <img src="assets/brand-stanford.png" width="36" height="36" alt="" decoding="async">
                <h2>Stanford ML</h2>
            </div>
            <div class="notes-grid">
                <a href="stanford/lecture_1.html" class="note-card">
                    <div class="note-info">
                        <div class="note-title">Lecture 1</div>
                        <div class="note-date">CS229 Machine Learning<span class="date-tag"> — Mar 18, 2026</span></div>
                    </div>
                    <div class="note-arrow">→</div>
                </a>
                <a href="stanford/lecture_2.html" class="note-card">
                    <div class="note-info">
                        <div class="note-title">Lecture 2</div>
                        <div class="note-date">Linear regression, gradient descent, normal equations<span class="date-tag"> — Mar 20, 2026</span></div>
                    </div>
                    <div class="note-arrow">→</div>
                </a>
                <!-- Lecture 3 - Add when available: <a href="stanford/lecture_3.html" class="note-card">...</a> -->
            </div>
        </div>
    </div>
</body>
</html>

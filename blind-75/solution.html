<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.png">
    <title>Blind 75 — Solution</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .wrapper { width: 100%; max-width: 640px; margin: 0 auto; }
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .navbar-brand {
            font-size: 1.35em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { color: #764ba2; }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 32px;
            text-align: center;
        }
        .card h1 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 12px;
        }
        .card p {
            color: #555;
            line-height: 1.65;
            margin-bottom: 10px;
        }
        .card .n-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 14px;
            background: #e8eaf6;
            border-radius: 999px;
            font-weight: 600;
            color: #4a3a6b;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <a href="../index.html" class="navbar-brand">🎓 Ashu Singh</a>
            <a href="../blind-75.html" class="back-link">← Back to Blind 75</a>
        </nav>
        <div class="card">
            <h1 id="heading">Blind 75 solution</h1>
            <p id="message">Loading…</p>
            <p id="sub" class="n-badge" hidden></p>
        </div>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var n = parseInt(params.get('n'), 10);
            var msg = document.getElementById('message');
            var sub = document.getElementById('sub');
            var heading = document.getElementById('heading');
            if (!params.has('n') || isNaN(n) || n < 1 || n > 75) {
                heading.textContent = 'Blind 75';
                msg.textContent = 'Pick a problem from the Blind 75 table and use Open in the Solution column.';
                return;
            }
            heading.textContent = 'Solution not added yet';
            msg.textContent = 'There is no write-up for this problem on the site yet. You can still use the Link column on Blind 75 to open the problem on LeetCode or NeetCode.';
            sub.hidden = false;
            sub.textContent = 'Problem #' + n;
        })();
    </script>
</body>
</html>

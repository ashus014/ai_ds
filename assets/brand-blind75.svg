<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <!-- Blind 75–style mark: triple stem + concentric loops + center dots -->
  <defs>
    <linearGradient id="bl75stemShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b71c1c" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#8b1515" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#b71c1c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#ffffff" stroke="#ececec" stroke-width="0.4"/>
  <!-- stem shadow where curves meet bars -->
  <rect x="10.35" y="5.5" width="1.15" height="21" fill="url(#bl75stemShadow)"/>
  <!-- triple vertical stem -->
  <g fill="#e53935">
    <rect x="4.85" y="5.25" width="1.75" height="21.5" rx="0.35"/>
    <rect x="7.15" y="5.25" width="1.75" height="21.5" rx="0.35"/>
    <rect x="9.45" y="5.25" width="1.75" height="21.5" rx="0.35"/>
  </g>
  <!-- upper loop: outer red → white ring → inner red → white bullseye -->
  <path d="M 11.15 5.35 A 10.2 9.85 0 0 1 11.15 15.65 Z" fill="#e53935"/>
  <path d="M 11.28 7.55 A 7.6 7.35 0 0 1 11.28 13.45 Z" fill="#ffffff"/>
  <path d="M 11.38 8.85 A 6.15 5.95 0 0 1 11.38 12.15 Z" fill="#e53935"/>
  <circle cx="20.05" cy="10.5" r="1.35" fill="#ffffff"/>
  <!-- lower loop (mirror sweep so bulge stays on the right) -->
  <path d="M 11.15 16.35 A 10.2 9.85 0 0 1 11.15 26.65 Z" fill="#e53935"/>
  <path d="M 11.28 18.55 A 7.6 7.35 0 0 1 11.28 24.45 Z" fill="#ffffff"/>
  <path d="M 11.38 19.85 A 6.15 5.95 0 0 1 11.38 23.15 Z" fill="#e53935"/>
  <circle cx="20.05" cy="21.5" r="1.35" fill="#ffffff"/>
</svg>
